spec:
  containers:
    - name: velocity-ai
      image: sfcogsops-snowhouse-aws-us-west-2.registry.snowflakecomputing.com/temp/scuret/velocity_ai_images/velocity_ai:latest
      env:
        SNOWFLAKE_DATABASE: TEMP
        SNOWFLAKE_SCHEMA: VELOCITY_AI
        SNOWFLAKE_WAREHOUSE: SE_AD_WH
        DEPLOY_TS: "20260413-1"
      readinessProbe:
        port: 8000
        path: /
  endpoints:
    - name: ui
      port: 8000
      public: true
